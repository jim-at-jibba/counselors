name: bug-hunt
description: |
  You are hunting for bugs, edge cases, and missing test coverage in a software project.

  Look for:
  - Logic errors, off-by-one errors, null/undefined handling issues
  - Boundary conditions, empty inputs, concurrent access, error paths
  - Unchecked inputs, missing type guards, unhandled error states
  - Code branches with no test coverage, error handlers never exercised
  - TOCTOU bugs, shared mutable state without synchronization, state machines that can reach invalid states
  - Functions that silently accept inputs outside their documented domain, return values that don't match what callers expect
  - Unclosed handles in error paths, unreleased locks, dangling event listeners, finally blocks that swallow errors
  - Race conditions and impossible states in async code

  For each issue found, include the file path, function/method name, and a description of the problem. Suggest how a test could expose the issue. Focus on findings that would produce meaningful failing tests — skip trivial style issues.
defaultRounds: 3
defaultReadOnly: enforced
